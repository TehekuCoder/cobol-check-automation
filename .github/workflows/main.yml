name: COBOL Check Automation

on:
  push:
    branches: [ main ]

jobs:
  mainframe-pipeline:
    runs-on: ubuntu-latest
    
    # Map Secrets to Environment Variables for the Runner
    env:
      ZOWE_HOST: ${{ secrets.ZOWE_HOST }}
      ZOWE_PORT: ${{ secrets.ZOWE_PORT }}
      ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}
      ZOWE_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (for Zowe CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Zowe CLI
        run: npm install -g @zowe/cli@zowe-v2-lts

      - name: Run Upload Script
        # We pass the username to the script as an environment variable
        run: |
          chmod +x .github/scripts/zowe_operations.sh
          ./.github/scripts/zowe_operations.sh

      - name: Execute Tests on Mainframe via SSH
        # We trigger the script on the mainframe and pass the username as the first argument ($1)
        run: |
          zowe zos-ssh issue command "bash /z/$ZOWE_USERNAME/cobolcheck/mainframe_operations.sh $ZOWE_USERNAME" \
            --host $ZOWE_HOST \
            --user $ZOWE_USERNAME \
            --pass $ZOWE_PASSWORD \
            --port 22
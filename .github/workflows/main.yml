name: COBOL Check Automation
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  COBOL_CHECK_VERSION: "0.2.19"

jobs:
  cobol-check:
    name: Upload & Run COBOL Check on Mainframe
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download COBOL Check
        run: |
          curl -L https://github.com/openmainframeproject/cobol-check/raw/Developer/build/distributions/cobol-check-${{ env.COBOL_CHECK_VERSION }}.zip \
            -o $GITHUB_WORKSPACE/cobol-check.zip

      - name: Set up sshpass
        run: sudo apt-get install -y sshpass

      - name: Enter the host key (no interactive prompt)
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 22 ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Upload COBOL check files to the mainframe (scp)
        run: |
          chmod +x .github/scripts/zowe_operations.sh
          .github/scripts/zowe_operations.sh
        env:
          SSH_HOST:     ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

      - name: Run a COBOL check on the mainframe (SSH)
        run: |
          chmod +x .github/scripts/mainframe_operations.sh
          .github/scripts/mainframe_operations.sh
        env:
          SSH_HOST:     ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

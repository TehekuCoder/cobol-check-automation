name: COBOL Check Automation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub UI

env:
  COBOL_CHECK_VERSION: "0.2.9"
  JAVA_VERSION: "17"           # LTS instead of deprecated Java 11

jobs:
  unit-tests:
    name: COBOL Unit Tests (Local)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # v4 is current — v2 is outdated

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin     # explicit distribution required in v4

      - name: Cache COBOL Check jar
        uses: actions/cache@v4
        id: cache-cobolcheck
        with:
          path: cobol-check/
          key: cobolcheck-${{ env.COBOL_CHECK_VERSION }}

      - name: Run COBOL Check (local / gnuCOBOL)
        run: |
          chmod +x .github/scripts/run_cobol_check.sh
          .github/scripts/run_cobol_check.sh
        continue-on-error: false    # fail the pipeline on test failure

      - name: Upload test results
        if: always()               # upload even when tests fail
        uses: actions/upload-artifact@v4
        with:
          name: cobol-check-results
          path: |
            **/CC##99.CBL
            **/TEST-*.xml
          retention-days: 14

  mainframe-deploy:
    name: Upload & Test on Mainframe
    runs-on: ubuntu-latest
    needs: unit-tests              # only deploy after local tests pass
    if: github.ref == 'refs/heads/main'  # only on main branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Install Zowe CLI
        run: |
          npm install -g @zowe/cli@latest --quiet
          zowe --version

      - name: Create Zowe profile from secrets
        env:
          ZOWE_HOST:     ${{ secrets.ZOWE_HOST }}
          ZOWE_PORT:     ${{ secrets.ZOWE_PORT }}
          ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}
          ZOWE_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}
        run: |
          zowe profiles create zosmf MainframeProfile \
            --host     "$ZOWE_HOST"     \
            --port     "$ZOWE_PORT"     \
            --user     "$ZOWE_USERNAME" \
            --password "$ZOWE_PASSWORD" \
            --reject-unauthorized false \
            --overwrite

      - name: Prepare mainframe environment
        env:
          ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}
        run: |
          chmod +x .github/scripts/zowe_operations.sh
          .github/scripts/zowe_operations.sh

      - name: Run COBOL Check on mainframe & submit JCL jobs
        env:
          ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}
        run: |
          chmod +x .github/scripts/mainframe_operations.sh
          .github/scripts/mainframe_operations.sh

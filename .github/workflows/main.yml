name: COBOL Check Automation

on:
  push:
    branches: [main]
  workflow_dispatch:  # manueller Trigger über GitHub UI

env:
  COBOL_CHECK_VERSION: "0.2.9"
  JAVA_VERSION: "17"            # LTS statt veraltetem Java 11

jobs:
  cobol-check:
    name: Upload & Run COBOL Check on Mainframe
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # v4 ist aktuell — v2 ist veraltet

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin    # explizite Distribution erforderlich in v4

      - name: Install Zowe CLI
        run: |
          npm install -g @zowe/cli@latest --quiet
          zowe --version

      - name: Create Zowe profile from secrets
        env:
          ZOWE_HOST:     ${{ secrets.ZOWE_HOST }}
          ZOWE_PORT:     ${{ secrets.ZOWE_PORT }}
          ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}
          ZOWE_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}
        run: |
          zowe profiles create zosmf MainframeProfile \
            --host     "$ZOWE_HOST"     \
            --port     "$ZOWE_PORT"     \
            --user     "$ZOWE_USERNAME" \
            --password "$ZOWE_PASSWORD" \
            --reject-unauthorized false \
            --overwrite

      - name: Setup mainframe environment and upload COBOL Check
        env:
          ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}
          ZOWE_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}
        run: |
          chmod +x .github/scripts/zowe_operations.sh
          .github/scripts/zowe_operations.sh

      - name: Run COBOL Check on mainframe
        env:
          ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}
          ZOWE_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}
        run: |
          chmod +x .github/scripts/mainframe_operations.sh
          .github/scripts/mainframe_operations.sh

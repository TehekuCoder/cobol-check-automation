name: COBOL Check Automation 2026

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cobol-check:
    runs-on: ubuntu-latest
    
    # We define the connection data centrally as environment variables
    env:
      ZOWE_HOST: ${{ secrets.ZOWE_HOST }}
      ZOWE_PORT: ${{ secrets.ZOWE_PORT }}
      ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}
      ZOWE_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Zowe CLI
        run: npm install -g @zowe/cli@zowe-v2-lts

      - name: Setup & Upload (USS)
        run: |
          chmod +x .github/scripts/zowe_operations.sh
          ./.github/scripts/zowe_operations.sh

      - name: Execute Tests (Mainframe)
        run: |
          chmod +x .github/scripts/mainframe_operations.sh
          ./.github/scripts/mainframe_operations.sh